services:
  - type: web
    name: makesurenew
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: makesurenew-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false          # set manually in Render dashboard
      - key: GITHUB_CLIENT_SECRET
        sync: false          # set manually in Render dashboard
      - key: GITHUB_REDIRECT_URI
        value: https://makesurenew.onrender.com/api/auth/callback
      - key: FRONTEND_URL
        value: https://makesurenew.onrender.com

databases:
  - name: makesurenew-db
    plan: free
    databaseName: makesurenew
