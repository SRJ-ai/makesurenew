name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Syntax check
        run: python -m py_compile makesurenew

      - name: CLI smoke tests
        run: python -c "import subprocess, sys; subprocess.run([sys.executable, 'makesurenew', '--help'], check=True); subprocess.run([sys.executable, 'makesurenew', '--version'], check=True)"
