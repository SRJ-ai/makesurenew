services:
  - type: web
    name: makesurenew
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: makesurenew-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false          # set manually in Render dashboard
      - key: GITHUB_CLIENT_SECRET
        sync: false          # set manually in Render dashboard
      - key: GITHUB_REDIRECT_URI
        value: https://makesurenew.onrender.com/api/auth/callback
      - key: FRONTEND_URL
        value: https://makesurenew.onrender.com
      - key: GITHUB_WEBHOOK_SECRET
        sync: false          # set manually; leave blank to skip signature check
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: noreply@makesurenew.dev
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_TEAM_PRICE_ID
        sync: false

databases:
  - name: makesurenew-db
    plan: free
    databaseName: makesurenew
