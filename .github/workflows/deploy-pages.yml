name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (demo mode)
        run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: "true"
          VITE_BASE_PATH: /makesurenew/

      - name: Publish to repo root (main/root Pages source)
        run: |
          rm -rf assets docs
          cp -r frontend/dist/assets ./assets
          cp frontend/dist/index.html ./index.html
          cp index.html 404.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html assets/
          git diff --staged --quiet || git commit -m "chore: update demo build [skip ci]"
          git push
