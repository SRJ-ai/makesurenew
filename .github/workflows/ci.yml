name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend
        env:
          VITE_DEMO_MODE: "true"
          VITE_BASE_PATH: /makesurenew/

  backend:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Check syntax
        run: python -m py_compile app/main.py app/models.py app/schemas.py app/config.py app/database.py app/routers/auth.py app/routers/repos.py app/routers/dashboard.py app/services/scanner.py
        working-directory: backend
